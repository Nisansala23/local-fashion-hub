apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextjs.fullname" . }}-secrets
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "nextjs.labels" . | nindent 4 }}
  annotations:
    # ✅ Tells ArgoCD not to diff secrets (security)
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
# ✅ Secret values are injected by GitHub Actions
# They are NOT stored in values.yaml or Git!
# GitHub Actions runs:
# kubectl create secret generic <name> \
#   --from-literal=CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }} \
#   --from-literal=STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
#   --dry-run=client -o yaml | kubectl apply -f -
stringData:
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}