# helm/charts/ingress-nginx/values.yaml

# ✅ CORRECT structure for subchart
ingress-nginx:
  controller:
    replicaCount: 2

    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
        # ✅ Added - important for AWS NLB
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

    resources:
      requests:
        cpu: 100m
        memory: 90Mi
      limits:
        cpu: 500m
        memory: 256Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    config:
      use-real-ip: "true"
      proxy-body-size: "50m"
      # ✅ Added useful configs
      proxy-read-timeout: "60"
      proxy-send-timeout: "60"
      keep-alive: "75"