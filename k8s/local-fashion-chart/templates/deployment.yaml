apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-hub-deployment
  namespace: default
  labels:
    app: fashion-hub
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fashion-hub
  template:
    metadata:
      labels:
        app: fashion-hub
    spec:
      containers:
        - name: fashion-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_BASE_URL
              value: {{ .Values.env.NEXT_PUBLIC_BASE_URL | quote }}
