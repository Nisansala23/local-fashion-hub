apiVersion: apps/v1
kind: Deployment
metadata:
  name: fashion-hub-deployment
  namespace: default
  labels:
    app: fashion-hub
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fashion-hub
  template:
    metadata:
      labels:
        app: fashion-hub
    spec:
      containers:
        - name: fashion-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          
          resources:
          requests:
            cpu: "100m"      # Baseline target (100 millicores)
            memory: "128Mi"  # Baseline RAM
          limits:
            cpu: "500m"      # Maximum allowed CPU burst
            memory: "512Mi"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_BASE_URL
              value: {{ .Values.env.NEXT_PUBLIC_BASE_URL | quote }}
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-auth-secrets
                  key: CLERK_PUBLISHABLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-auth-secrets
                  key: CLERK_SECRET_KEY
