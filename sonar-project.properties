# Unique identifier matching your repository signature
sonar.projectKey=local-fashion-hub
sonar.projectName=Local Fashion Hub - Next.js Store

# Path to the source directories to scan
sonar.sources=app,components,hooks,store,constants

# Exclude compiled files, third-party libraries, and images from checking code quality
sonar.exclusions=node_modules/**, .next/**, public/**, images/**, next-env.d.ts

# Source code settings matching your Next.js project
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info