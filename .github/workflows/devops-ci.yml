name: Full DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ RUN QUALITY ASSURANCE VIA SONARQUBE
      - name: SonarQube Code Analysis Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 2️⃣ RUN TRIVY SECURITY VULNERABILITY AUDIT ON FILESYSTEM
      - name: Trivy FS Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 3️⃣ SET UP DOCKER ENGINE BUILD PLUGINS
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ AUTHENTICATE SECURELY WITH DOCKER HUB
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ BUILD AND PUSH THE IMAGE TARGET TO REGISTRY
      - name: Build and Push Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/local-fashion-hub:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/local-fashion-hub:${{ github.sha }}
