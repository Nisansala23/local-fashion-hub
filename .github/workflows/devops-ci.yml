name: Full DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣ RUN QUALITY ASSURANCE VIA SONARQUBE
      - name: SonarQube Code Analysis Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # 2️⃣ RUN TRIVY SECURITY VULNERABILITY AUDIT ON FILESYSTEM
      - name: Trivy FS Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 3️⃣ SET UP DOCKER ENGINE BUILD PLUGINS
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ AUTHENTICATE SECURELY WITH DOCKER HUB
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ BUILD AND PUSH THE IMAGE TARGET TO REGISTRY
      - name: Build and Push Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/local-fashion-hub:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/local-fashion-hub:${{ github.sha }}
          # 🌟 SECURE INJECTION: Pass the real keys to Docker as build arguments
          build-args: |
            NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
            NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}

      # 6️⃣ 🤖 AUTOMATED GITOPS UPDATE STEP
      - name: Update Helm Chart Manifest Image Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Modify the 'tag:' value directly in your values.yaml file matching the Docker SHA
          sed -i "s/tag:.*/tag: ${{ github.sha }}/g" k8s/local-fashion-chart/values.yaml
          
          # Commit the text alteration back to GitHub (ignoring CI iteration triggers)
          git add k8s/local-fashion-chart/values.yaml
          git commit -m "chore: auto-update deployment manifest image tag to ${{ github.sha }} [skip ci]"
          git push origin main